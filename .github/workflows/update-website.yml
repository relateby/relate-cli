name: Update website

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  update:
    name: Deploy website to gh-pages
    # Only run when Release succeeded and triggered by a version tag
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main (website source)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: main

      - name: Determine version and check prerelease
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          PRERELEASE=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isPrerelease --jq '.isPrerelease')
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Initialize gh-pages branch if absent
        if: ${{ steps.meta.outputs.prerelease != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd main
          if ! git ls-remote --exit-code origin gh-pages; then
            echo "gh-pages branch does not exist — creating orphan branch"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git rm -rf . --quiet
            git commit --allow-empty -m "init: create gh-pages branch"
            git push origin gh-pages
            git checkout -
          fi

      - name: Checkout gh-pages
        if: ${{ steps.meta.outputs.prerelease != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download install scripts from release
        if: ${{ steps.meta.outputs.prerelease != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.meta.outputs.tag }}" \
            --dir /tmp/release-scripts \
            --pattern "relate-installer.sh" \
            --pattern "relate-installer.ps1" \
            --repo "${{ github.repository }}"

      - name: Sync website files and update version
        if: ${{ steps.meta.outputs.prerelease != 'true' }}
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          # Copy entire website/ directory from main branch
          rsync -av --delete main/website/ gh-pages/ \
            --exclude ".git"

          # Overwrite install scripts with the ones from the release
          # (cargo-dist generates these; they are more current than what's in main)
          # cargo-dist names them relate-installer.sh/.ps1; serve as install.sh/.ps1
          cp /tmp/release-scripts/relate-installer.sh  gh-pages/install.sh
          cp /tmp/release-scripts/relate-installer.ps1 gh-pages/install.ps1

          # Update version badge in index.html
          sed -i \
            "s|<span id=\"current-version\">[^<]*</span>|<span id=\"current-version\">${VERSION}</span>|g" \
            gh-pages/index.html

      - name: Commit and push to gh-pages
        if: ${{ steps.meta.outputs.prerelease != 'true' }}
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "deploy: website for ${{ steps.meta.outputs.tag }}"
            git push origin gh-pages
          fi
