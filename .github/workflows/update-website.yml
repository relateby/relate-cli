name: Update website

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  update:
    name: Deploy website to gh-pages
    # Only run when Release succeeded, triggered by a version tag, and it's a stable release
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main (website source)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: main

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Determine version and check prerelease
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          PRERELEASE=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isPrerelease --jq '.isPrerelease')
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Skip if prerelease
        if: ${{ steps.meta.outputs.prerelease == 'true' }}
        run: echo "Prerelease detected — skipping website deploy." && exit 0

      - name: Download install scripts from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.meta.outputs.tag }}" \
            --dir /tmp/release-scripts \
            --pattern "install.sh" \
            --pattern "install.ps1" \
            --repo "${{ github.repository }}"

      - name: Sync website files and update version
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          # Copy entire website/ directory from main branch
          rsync -av --delete main/website/ gh-pages/ \
            --exclude ".git"

          # Overwrite install scripts with the ones from the release
          # (cargo-dist generates these; they are more current than what's in main)
          cp /tmp/release-scripts/install.sh  gh-pages/install.sh
          cp /tmp/release-scripts/install.ps1 gh-pages/install.ps1

          # Update version badge in index.html
          sed -i \
            "s|<span id=\"current-version\">[^<]*</span>|<span id=\"current-version\">${VERSION}</span>|g" \
            gh-pages/index.html

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "deploy: website for ${{ steps.meta.outputs.tag }}"
            git push origin gh-pages
          fi
